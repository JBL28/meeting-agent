services:
  mysql:
    image: mysql:8.0
    container_name: meeting-agent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meetingdb
      MYSQL_USER: meeting
      MYSQL_PASSWORD: meeting
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umeeting", "-pmeeting"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
