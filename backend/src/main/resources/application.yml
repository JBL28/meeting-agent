server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: meeting-agent-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/meetingdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:meeting}
    password: ${SPRING_DATASOURCE_PASSWORD:meeting}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

openai:
  api-key: ${OPENAI_API_KEY:}
  transcribe-model: ${OPENAI_TRANSCRIBE_MODEL:gpt-4o-transcribe-diarize}
storage:
  base-path: ${STORAGE_BASE_PATH:./data}
jira:
  mcp-server-url: ${JIRA_MCP_SERVER_URL:}
notion:
  mcp-server-url: ${NOTION_MCP_SERVER_URL:}
integration:
  token-encryption-key: ${INTEGRATION_TOKEN_ENCRYPTION_KEY:}

jwt:
  secret: ${JWT_SECRET:bWVldGluZy1hZ2VudC1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LWtleS0zMi1ieXRlcy1taW4=}
  access-token-seconds: ${JWT_ACCESS_TOKEN_SECONDS:3600}
  refresh-token-seconds: ${JWT_REFRESH_TOKEN_SECONDS:604800}

logging:
  level:
    root: INFO
    com.ssafy.meeting: INFO
